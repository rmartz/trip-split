name: Secret Scan

on:
  pull_request:
  push:
    branches: [main]

jobs:
  secret-scan:
    uses: rmartz/vercel-deploy-scripts/.github/workflows/secret-scan.yml@v1.1.0
    with:
      config-path: .gitleaks.toml
    permissions:
      contents: read
      pull-requests: write

  validate-config:
    name: Validate deployment config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: node scripts/validate-config.mjs
