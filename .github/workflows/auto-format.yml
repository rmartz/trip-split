name: Auto-format

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions: {}

jobs:
  auto-format:
    name: Auto-format
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Only run when CI failed, on non-main branches, and on Claude-authored
    # commits (prevents loops since the fix commit has no co-author)
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch != 'main' &&
      contains(github.event.workflow_run.head_commit.message, 'Co-Authored-By: Claude')
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          token: ${{ secrets.CI_PAT_TOKEN }}

      # Install prettier directly (not from repo package.json) to avoid
      # executing untrusted lifecycle scripts from the checked-out code.
      - run: npx prettier@3 --write .

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push formatting fixes
        if: steps.diff.outputs.changed == 'true'
        env:
          TARGET_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: auto-format"
          git push origin "HEAD:$TARGET_BRANCH"
