name: Auto-format

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  auto-format:
    name: Auto-format
    runs-on: ubuntu-latest
    # Only run when CI failed, on non-main branches, and on Claude-authored
    # commits (prevents loops since the fix commit has no co-author)
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch != 'main' &&
      contains(github.event.workflow_run.head_commit.message, 'Co-Authored-By: Claude')
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          token: ${{ secrets.CI_PAT_TOKEN }}

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Run Prettier
        run: pnpm prettier --write .

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push formatting fixes
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: auto-format"
          git push
