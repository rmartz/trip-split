name: "Setup"
description: "Install pnpm, Node.js, and project dependencies"

runs:
  using: "composite"
  steps:
    - uses: pnpm/action-setup@v5
      with:
        version: 10
    - uses: actions/setup-node@v6
      with:
        node-version: 24.x
        cache: "pnpm"
    - run: pnpm install --frozen-lockfile
      shell: bash
