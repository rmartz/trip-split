# Public environment variables for the production environment.
#
# Only non-sensitive variables belong here. All keys are validated against
# deployment/schema.yml — sensitive variables (private keys, auth tokens, DSNs)
# will be rejected by the pre-commit hook and CI.
#
# Sensitive variables are managed directly in Vercel and are never committed.
# Run `pnpm env:pull` to generate a local .env.local from Vercel's stored values.
#
# To update values: scripts/update-config.sh --env=production KEY=value (or --firebase-config=...)
# To deploy to Vercel: scripts/deploy-config.sh --env=production

environment: production

variables:
  # Firebase Client SDK — safe to expose; access control is enforced by Firebase security rules
  NEXT_PUBLIC_FIREBASE_API_KEY: "AIzaSyDJTYMaV0MqqQfQrbcNcco3s7K1FnXT2bM"
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "trip-split-317c7.firebaseapp.com"
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: "trip-split-317c7"
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "trip-split-317c7.firebasestorage.app"
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "426225381029"
  NEXT_PUBLIC_FIREBASE_APP_ID: "1:426225381029:web:3a3c0648c2d5e95fb2e74c"
  NEXT_PUBLIC_FIREBASE_DATABASE_URL: "https://trip-split-317c7-default-rtdb.firebaseio.com"

  # Firebase Admin SDK — project identifier only, not a credential
  FIREBASE_PROJECT_ID: ""

  # Sentry — slugs only, not credentials; DSN is public (NEXT_PUBLIC_*) so safe to commit
  NEXT_PUBLIC_SENTRY_DSN: ""
  SENTRY_ORG: ""
  SENTRY_PROJECT: ""
