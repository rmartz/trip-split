# gitleaks configuration
# https://github.com/gitleaks/gitleaks
#
# Extends the default ruleset with project-specific patterns and allowlists
# known false positives (e.g. example/placeholder values in documentation).

title = "trip-split"

[extend]
useDefault = true

[allowlist]
description = "Known safe patterns — placeholder values in documentation and config examples"
regexes = [
  # Placeholder values used in .env.example and documentation
  '''your-project-id''',
  '''your-project''',
  '''firebase-adminsdk-xxx''',
  # Example/truncated keys in ARCHITECTURE.md and README
  '''xxx@o\w+\.ingest\.sentry\.io''',
  # The .env.example file itself — it contains only placeholder values
]
paths = [
  ".env.example",
]

[[allowlists]]
description = "Firebase Client SDK API keys in deployment config — public browser keys, access-controlled by Firebase security rules"
# These are NEXT_PUBLIC_FIREBASE_API_KEY values intentionally committed to deployment/
# config files so deploy-config.sh can push them to Vercel. They are not service account
# credentials and cannot be used to access Firebase data without a matching security rule.
# Covers both YAML files (current) and the ephemeral JSON exports (now deleted, still in git history).
paths = [
  '''deployment/staging\.yml''',
  '''deployment/production\.yml''',
  '''deployment/staging\.json''',
  '''deployment/production\.json''',
]

# Project-specific rules for secrets not covered by the default ruleset

[[rules]]
id = "firebase-private-key"
description = "Firebase service account private key"
regex = '''-----BEGIN (RSA )?PRIVATE KEY-----'''
tags = ["firebase", "key"]

[[rules]]
id = "firebase-admin-json"
description = "Firebase service account JSON blob"
regex = '''"private_key_id"\s*:\s*"[a-f0-9]{40}"'''
tags = ["firebase", "key"]

[[rules]]
id = "vercel-token"
description = "Vercel API token"
regex = '''(?i)vercel[_-]?token['":\s=]+[A-Za-z0-9]{24,}'''
tags = ["vercel"]
