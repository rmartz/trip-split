[extend]
path = "node_modules/vercel-deploy-scripts/.gitleaks.toml"

[allowlist]
description = "Known safe patterns — placeholder values in documentation and config examples"
regexes = [
  # Placeholder values used in .env.example and documentation
  '''your-project-id''',
  '''your-project''',
  '''firebase-adminsdk-xxx''',
  # Example/truncated keys in ARCHITECTURE.md and README
  '''xxx@o\w+\.ingest\.sentry\.io''',
]
paths = [
  ".env.example",
]
# Commit that introduced Firebase Client SDK API keys into deployment/ config files.
# These are public browser keys (NEXT_PUBLIC_FIREBASE_*), not service account credentials —
# access control is enforced by Firebase security rules, not by keeping the key private.
commits = [
  "528ce30405d04a57880b48035837a516ad6cf3b2",
]
